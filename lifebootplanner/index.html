<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lifeboat — CrossFit lesson planning done uncommonly well</title>
  <meta name="description" content="Lifeboat Lesson Planner — CrossFit lesson planning done uncommonly well. Join the waitlist." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --orange:    #FF5A0A;
      --orange-dk: #E14E07;
      --orange-lt: #FFE6D8;
      --ink:       #1A1208;
      --paper:     #FDFAF6;
      --muted:     #8C7B6B;
      --border:    #E8DDD0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Mono', monospace;
      background-color: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem;
      width: 100%;
    }

    .logo-mark {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(255, 90, 10, 0.14);
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
      padding: 4.5rem 0 5rem;
    }

    .hero-brand {
      margin-bottom: 1.75rem;
      animation: fadeUp 0.6s 0.05s ease both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.75rem;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    h1 em {
      font-style: italic;
      color: var(--orange);
    }

    .waitlist {
      margin-top: 0.5rem;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .form-row {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.2s;
      max-width: 480px;
    }

    .form-row:focus-within {
      border-color: var(--orange);
    }

    .form-row input[type="email"] {
      flex: 1;
      padding: 0.9rem 1.1rem;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink);
      letter-spacing: 0.02em;
    }

    .form-row input::placeholder {
      color: var(--border);
    }

    .form-row button {
      padding: 0.9rem 1.4rem;
      background: var(--orange);
      color: #fff;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .form-row button:hover { background: var(--orange-dk); }
    .form-row button:disabled { opacity: 0.6; cursor: not-allowed; }

    .success-msg {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.2rem;
      background: var(--orange-lt);
      border-radius: 4px;
      max-width: 480px;
    }

    .success-msg.show { display: flex; }

    .success-msg span {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--orange-dk);
    }

    .error-msg {
      display: none;
      margin-top: 0.6rem;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      color: #c0392b;
      max-width: 480px;
    }

    .error-msg.show { display: block; }

    .orange-rule {
      display: block;
      width: 36px;
      height: 2px;
      background: var(--orange);
      margin-bottom: 2.5rem;
      animation: expandRule 0.8s 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes expandRule {
      from { width: 0; opacity: 0; }
      to   { width: 36px; opacity: 1; }
    }

    @media (max-width: 560px) {
      .form-row { flex-direction: column; }
      .form-row button { padding: 0.85rem; text-align: center; }
      .hero { min-height: auto; padding: 4rem 0 4.5rem; }
    }
  </style>
</head>
<body>

  <main>
    <section class="hero">
      <div class="hero-brand">
        <img class="logo-mark" src="assets/lifeboat-logo.png" alt="Lifeboat logo" />
      </div>

      <h1>CrossFit lesson planning,<br /><em>done uncommonly<br />well.</em></h1>

      <span class="orange-rule"></span>

      <div class="waitlist">
        <form id="waitlist-form">
          <div class="form-row">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="your@email.com"
              required
              autocomplete="email"
            />
            <button type="submit" id="submit-btn">Join waitlist</button>
          </div>
        </form>

        <div class="error-msg" id="error-msg" role="alert" aria-live="polite">
          Something went wrong — please try again.
        </div>

        <div class="success-msg" id="success-msg" role="status" aria-live="polite">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <circle cx="9" cy="9" r="9" fill="#F4641A"/>
            <path d="M5 9l3 3 5-5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>You're on the list — we'll be in touch.</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const form      = document.getElementById('waitlist-form');
    const btn       = document.getElementById('submit-btn');
    const successMsg = document.getElementById('success-msg');
    const errorMsg  = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;

      // Loading state
      btn.disabled = true;
      btn.textContent = 'Joining...';
      errorMsg.classList.remove('show');

      try {
        const res = await fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        if (res.ok) {
          form.style.display = 'none';
          successMsg.classList.add('show');
        } else {
          throw new Error('Server error');
        }
      } catch {
        btn.disabled = false;
        btn.textContent = 'Join waitlist';
        errorMsg.classList.add('show');
      }
    });
  </script>

</body>
</html>
